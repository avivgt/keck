apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: keckclusters.keck.io
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.0
  labels:
    app.kubernetes.io/managed-by: keck-operator
    app.kubernetes.io/part-of: keck
spec:
  group: keck.io
  names:
    kind: KeckCluster
    listKind: KeckClusterList
    plural: keckclusters
    singular: keckcluster
    shortNames:
      - keck
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Agents
          type: integer
          jsonPath: .status.agentReady
        - name: Controller
          type: boolean
          jsonPath: .status.controllerReady
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          description: KeckCluster deploys Keck power metering to a Kubernetes cluster.
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                agent:
                  type: object
                  properties:
                    defaultProfile:
                      type: string
                      enum: [minimal, standard, full]
                      default: standard
                    nodeSelector:
                      type: object
                      additionalProperties:
                        type: string
                    tolerations:
                      type: array
                      items:
                        type: object
                        properties:
                          key:
                            type: string
                          operator:
                            type: string
                          value:
                            type: string
                          effect:
                            type: string
                          tolerationSeconds:
                            type: integer
                            format: int64
                    resources:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    gpuEnabled:
                      type: boolean
                      default: false
                    redfish:
                      type: object
                      description: BMC/iDRAC configuration for real measured PSU power.
                      properties:
                        credentialsSecret:
                          type: string
                          description: Secret name with keys "username" and "password" for BMC auth.
                        nodeBMCMap:
                          type: array
                          description: Maps node serial numbers to BMC endpoint URLs.
                          items:
                            type: object
                            properties:
                              serial:
                                type: string
                                description: Node serial number (from /sys/class/dmi/id/product_serial).
                              endpoint:
                                type: string
                                description: BMC/iDRAC URL (e.g., https://10.0.0.1).
                            required: [serial, endpoint]
                      required: [credentialsSecret, nodeBMCMap]
                controller:
                  type: object
                  properties:
                    replicas:
                      type: integer
                      format: int32
                      minimum: 1
                      maximum: 3
                      default: 1
                    resources:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    schedulerEnabled:
                      type: boolean
                      default: false
                    carbonAPIEndpoint:
                      type: string
                    carbonRegion:
                      type: string
                    energyCostPerKWh:
                      type: string
                      default: "0.10"
                fleetEndpoint:
                  type: string
                image:
                  type: object
                  properties:
                    repository:
                      type: string
                      default: quay.io/aguetta/keck
                    tag:
                      type: string
                      default: latest
                    pullPolicy:
                      type: string
                      default: IfNotPresent
                    pullSecrets:
                      type: array
                      items:
                        type: object
                        properties:
                          name:
                            type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                agentReady:
                  type: integer
                  format: int32
                agentDesired:
                  type: integer
                  format: int32
                controllerReady:
                  type: boolean
                lastUpdated:
                  type: string
                  format: date-time
                message:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                    required: [type, status, lastTransitionTime, reason, message]
