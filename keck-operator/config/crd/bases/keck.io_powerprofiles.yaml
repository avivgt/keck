apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: powerprofiles.keck.io
  labels:
    app.kubernetes.io/managed-by: keck-operator
    app.kubernetes.io/part-of: keck
spec:
  group: keck.io
  names:
    kind: PowerProfile
    listKind: PowerProfileList
    plural: powerprofiles
    singular: powerprofile
    shortNames:
      - pp
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Profile
          type: string
          jsonPath: .spec.profile
        - name: Nodes
          type: integer
          jsonPath: .status.matchingNodes
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          description: PowerProfile overrides the agent profile for nodes matching a label selector.
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required: [profile, nodeSelector]
              properties:
                profile:
                  type: string
                  enum: [minimal, standard, full]
                  description: Agent profile to apply to matching nodes.
                nodeSelector:
                  type: object
                  additionalProperties:
                    type: string
                  description: Nodes matching these labels get this profile.
                drainIntervalMs:
                  type: integer
                  format: int32
                  description: Override drain interval in milliseconds.
                gpuEnabled:
                  type: boolean
                  description: Override GPU monitoring setting.
            status:
              type: object
              properties:
                matchingNodes:
                  type: integer
                  format: int32
                nodeNames:
                  type: array
                  items:
                    type: string
