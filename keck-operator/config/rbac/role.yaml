apiVersion: v1
kind: ServiceAccount
metadata:
  name: keck-operator
  namespace: keck-system
  labels:
    app.kubernetes.io/managed-by: keck-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: keck-operator
  labels:
    app.kubernetes.io/managed-by: keck-operator
rules:
  # Keck CRDs
  - apiGroups: ["keck.io"]
    resources: ["*"]
    verbs: ["*"]
  # Core resources managed by the operator
  - apiGroups: [""]
    resources: ["namespaces", "serviceaccounts", "services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Workload resources
  - apiGroups: ["apps"]
    resources: ["daemonsets", "deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # RBAC
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: keck-operator
  labels:
    app.kubernetes.io/managed-by: keck-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: keck-operator
subjects:
  - kind: ServiceAccount
    name: keck-operator
    namespace: keck-system
