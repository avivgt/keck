# Deploy Keck to the cluster with BMC power monitoring.
apiVersion: keck.io/v1alpha1
kind: KeckCluster
metadata:
  name: keck
spec:
  agent:
    defaultProfile: standard

    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule

    # BMC/iDRAC configuration for real measured PSU power.
    # This gives ground truth — actual watts at the PSU.
    redfish:
      # Secret containing keys "username" and "password"
      credentialsSecret: redfish-credentials

      # Map each node's serial number to its BMC/iDRAC IP.
      # Find serial numbers: cat /sys/class/dmi/id/product_serial
      nodeBMCMap:
        - serial: "41DQMH3"
          endpoint: "https://192.168.52.166"
        - serial: "D59N3L3"
          endpoint: "https://192.168.52.172"

  controller:
    replicas: 1

  image:
    repository: ghcr.io/avivgt/keck
    tag: latest
    pullPolicy: IfNotPresent

---
# BMC credentials — create this before applying the KeckCluster.
# In production, use sealed-secrets or external-secrets-operator.
apiVersion: v1
kind: Secret
metadata:
  name: redfish-credentials
  namespace: keck-system
type: Opaque
stringData:
  username: root
  password: calvin
